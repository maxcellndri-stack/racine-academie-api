<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Racine Académie — Marketing Digital & Réseaux Sociaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&family=Alex+Brush&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F6F2E9;
    --bg-soft: #FFFFFF;
    --panel: #FFFFFF;
    --teal: #EFE6D2;
    --gold: #B8872B;
    --gold-soft: #8C6A1F;
    --cream: #1B2A4A;
    --olive: #64707A;
    --danger: #A6392B;
    --radius: 14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  h1,h2,h3,.display{font-family:'Sora', sans-serif; font-weight:800;}
  a{color:inherit;}
  button{
    font-family:'Inter', sans-serif;
    cursor:pointer;
    border:none;
    outline:none;
  }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible{
    outline: 2px solid var(--gold-soft);
    outline-offset: 2px;
  }
  ::selection{ background: var(--gold); color: #1B2A4A; }

  /* ---------- Layout shells ---------- */
  .app{ min-height:100vh; display:flex; flex-direction:column; }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 28px;
    border-bottom: 1px solid rgba(27,42,74,0.08);
    position: sticky; top:0; z-index:20;
    background: rgba(246,242,233,0.85);
    backdrop-filter: blur(8px);
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-logo{
    width:38px; height:38px;
    border-radius:50%;
    object-fit:cover;
    background: #FFFFFF;
    border: 1px solid rgba(184,135,43,0.5);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .brand-name{ font-size:1.05rem; letter-spacing:0.02em; }
  .brand-name .sub{ display:block; font-family:'Inter'; font-weight:400; font-size:0.68rem; color:var(--olive); letter-spacing:0.14em; text-transform:uppercase; margin-top:2px;}

  .pill{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    color: var(--olive);
    border:1px solid rgba(100,112,122,0.35);
    border-radius: 999px;
    padding: 6px 12px;
  }

  main{ flex:1; }

  /* ---------- Hero / Landing ---------- */
  .hero{
    max-width: 900px;
    margin: 0 auto;
    padding: 64px 28px 40px;
    position:relative;
    overflow:hidden;
  }
  .roots-bg{
    position:absolute; inset:0; z-index:0; opacity:0.5;
    pointer-events:none;
  }
  .roots-signature{
    position:absolute;
    top: -10px; right: -40px;
    width: 320px; height: 320px;
    opacity: 0.9;
    pointer-events:none;
    z-index:0;
  }
  .roots-signature path{
    fill:none;
    stroke: var(--gold);
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    animation: draw-root 2.4s ease-out forwards;
  }
  .roots-signature path.thin{ stroke: var(--olive); stroke-width: 1; opacity:0.7; }
  .roots-signature path:nth-child(1){ animation-delay: 0s; }
  .roots-signature path:nth-child(2){ animation-delay: .15s; }
  .roots-signature path:nth-child(3){ animation-delay: .3s; }
  .roots-signature path:nth-child(4){ animation-delay: .45s; }
  .roots-signature path:nth-child(5){ animation-delay: .6s; }
  .roots-signature path:nth-child(6){ animation-delay: .75s; }
  .roots-signature circle{
    fill: var(--gold-soft);
    opacity:0;
    animation: fade-dot .6s ease-out forwards;
    animation-delay: 2.2s;
  }
  @keyframes draw-root{
    to{ stroke-dashoffset: 0; }
  }
  @keyframes fade-dot{
    to{ opacity:1; }
  }
  .view-enter{ animation: view-fade .35s ease-out; }
  @keyframes view-fade{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .hero-inner{ position:relative; z-index:1; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    color: var(--gold-soft);
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 18px;
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before{
    content:''; width:22px; height:1px; background: var(--gold-soft);
  }
  .hero h1{
    font-size: clamp(2.1rem, 5vw, 3.4rem);
    line-height:1.08;
    max-width: 11ch;
    margin-bottom: 22px;
  }
  .hero h1 em{ color: var(--gold-soft); font-style:normal; }
  .hero p.lead{
    max-width: 54ch;
    color: var(--olive);
    font-size: 1.05rem;
    line-height:1.6;
    margin-bottom: 34px;
  }
  .cta-row{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .btn-primary{
    background: var(--gold);
    color: #1B2A4A;
    font-weight:600;
    font-size: 0.95rem;
    padding: 15px 26px;
    border-radius: var(--radius);
    transition: transform .15s ease, background .15s ease;
  }
  .btn-primary:hover{ background: var(--gold-soft); transform: translateY(-1px); }
  .price-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
    color: var(--cream);
  }
  .price-tag .amt{ color: var(--gold-soft); font-size:1.05rem; }

  .trust-row{
    margin-top:40px; padding-top:28px;
    border-top: 1px solid rgba(27,42,74,0.08);
    display:flex; gap:32px; flex-wrap:wrap;
  }
  .trust-item{ display:flex; flex-direction:column; gap:4px; }
  .trust-item .num{ font-family:'Sora'; font-weight:700; font-size:1.3rem; color: var(--gold-soft); }
  .trust-item .lbl{ font-size:0.78rem; color: var(--olive); }

  /* ---------- Curriculum (numbered, real sequence) ---------- */
  .section{ max-width: 900px; margin: 0 auto; padding: 20px 28px 70px; }
  .section-head{ margin-bottom: 26px; }
  .section-head h2{ font-size: 1.5rem; margin-bottom:8px; }
  .section-head p{ color: var(--olive); font-size:0.92rem; max-width:52ch; }

  /* ---------- Catalog ---------- */
  .catalog-grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:14px;
  }
  .cat-card{
    background: var(--panel);
    border:1px solid rgba(27,42,74,0.08);
    border-radius: var(--radius);
    padding: 22px;
    text-align:left;
    display:flex; flex-direction:column; gap:14px;
    min-height: 150px;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease, background .2s ease;
    color: var(--cream);
    position:relative;
    overflow:hidden;
  }
  .cat-card::before{
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(circle at 85% -20%, rgba(184,135,43,0.12), transparent 60%);
    opacity:0; transition: opacity .25s ease;
    pointer-events:none;
  }
  .cat-card.active:hover::before{ opacity:1; }
  .cat-card.active{ cursor:pointer; }
  .cat-card.active:hover{
    border-color: var(--gold-soft);
    transform: translateY(-3px);
    box-shadow: 0 14px 32px -12px rgba(0,0,0,0.5);
    background: #1E4029;
  }
  .cat-card.soon{ opacity:0.5; cursor:default; }
  .cat-icon{
    width:38px; height:38px;
    border-radius:10px;
    background: rgba(184,135,43,0.12);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .cat-icon svg{ width:20px; height:20px; }
  .cat-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; position:relative; z-index:1; }
  .cat-top-left{ display:flex; align-items:center; gap:12px; }
  .cat-title{ font-family:'Sora'; font-weight:700; font-size:1.02rem; line-height:1.3; }
  .cat-price{ margin-top:auto; font-family:'JetBrains Mono'; font-size:0.78rem; color: var(--gold-soft); position:relative; z-index:1; }
  .cat-badge{ font-family:'JetBrains Mono'; font-size:0.65rem; padding:4px 9px; border-radius:999px; white-space:nowrap; flex-shrink:0; }
  .cat-badge.live{ background: rgba(184,135,43,0.18); color: var(--gold-soft); }
  .cat-badge.soon{ background: rgba(100,112,122,0.15); color: var(--olive); }

  .modules{ display:flex; flex-direction:column; border-radius: var(--radius); overflow:hidden; border:1px solid rgba(27,42,74,0.08); }
  .module-row{
    display:flex; align-items:center; gap:18px;
    padding: 18px 20px;
    background: var(--panel);
    border-bottom:1px solid rgba(27,42,74,0.06);
    border-left: 2px solid transparent;
    cursor:pointer;
    transition: background .18s ease, border-left-color .18s ease, padding-left .18s ease;
  }
  .module-row:last-child{ border-bottom:none; }
  .module-row:hover{ background: var(--teal); border-left-color: var(--gold); padding-left:24px; }
  .module-row.locked{ cursor:not-allowed; opacity:0.72; }
  .module-row.locked:hover{ background: var(--panel); border-left-color:transparent; padding-left:20px; }
  .module-row.done{ }
  .m-index{
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    color: var(--gold-soft);
    width: 28px; flex-shrink:0;
  }
  .m-body{ flex:1; min-width:0; }
  .m-title{ font-weight:600; font-size:0.96rem; margin-bottom:3px; }
  .m-desc{ color: var(--olive); font-size:0.82rem; }
  .m-status{ flex-shrink:0; }
  .badge{
    font-family:'JetBrains Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 10px;
    border-radius: 999px;
    letter-spacing:0.04em;
  }
  .badge.locked{ background: rgba(201,99,75,0.15); color: var(--danger); }
  .badge.open{ background: rgba(184,135,43,0.15); color: var(--gold-soft); }
  .badge.done{ background: rgba(100,112,122,0.18); color: var(--olive); }

  /* ---------- Payment ---------- */
  .paywall-card{
    background: var(--panel);
    border-radius: var(--radius);
    padding: 30px;
    border: 1px solid rgba(27,42,74,0.08);
  }
  .method-grid{ display:grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin: 22px 0; }
  .method-card{
    background: var(--bg-soft);
    border: 1px solid rgba(27,42,74,0.1);
    border-radius: 10px;
    padding: 16px;
    text-align:left;
    color: var(--cream);
    display:flex; flex-direction:column; gap:6px;
    transition: border-color .15s ease, background .15s ease;
  }
  .method-card:hover{ border-color: var(--gold-soft); }
  .method-card.selected{ border-color: var(--gold); background: rgba(184,135,43,0.08); }
  .method-name{ font-weight:600; font-size:0.9rem; }
  .method-sub{ font-size:0.75rem; color: var(--olive); }

  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:0.8rem; color: var(--olive); margin-bottom:6px; }
  .field input{
    width:100%; background: var(--bg-soft); border:1px solid rgba(27,42,74,0.14);
    border-radius:8px; padding: 12px 14px; color: var(--cream); font-family:'Inter'; font-size:0.92rem;
  }
  .field input::placeholder{ color: rgba(100,112,122,0.6); }

  .crypto-box{
    background: var(--bg-soft);
    border:1px dashed rgba(184,135,43,0.4);
    border-radius:10px;
    padding:14px 16px;
    font-family:'JetBrains Mono', monospace;
    font-size:0.76rem;
    color: var(--gold-soft);
    word-break: break-all;
    margin-bottom:16px;
  }

  .btn-block{ width:100%; padding:15px; border-radius:10px; font-weight:600; }
  .btn-ghost{ background:transparent; color:var(--olive); border:1px solid rgba(100,112,122,0.3); border-radius:10px; padding:12px 18px; font-size:0.85rem; }

  .note{ font-size:0.78rem; color: var(--olive); line-height:1.5; margin-top:14px; }

  /* ---------- Course reader ---------- */
  .reader-shell{ max-width: 760px; margin:0 auto; padding: 40px 28px 80px; }
  .reader-head{ margin-bottom: 30px; }
  .breadcrumb{ font-family:'JetBrains Mono', monospace; font-size:0.75rem; color: var(--olive); margin-bottom:14px; display:flex; align-items:center; gap:8px; cursor:pointer; }
  .reader-head h2{ font-size:1.6rem; margin-bottom:10px; }
  .progress-track{ height:4px; background: rgba(27,42,74,0.08); border-radius:2px; overflow:hidden; margin-top:16px; }
  .progress-fill{ height:100%; background: var(--gold); transition: width .4s ease; }

  .lesson-body{ line-height:1.75; font-size:1rem; color: var(--cream); }
  .lesson-body p{ margin-bottom:16px; }
  .lesson-body strong{ color: var(--gold-soft); }
  .lesson-body ul{ margin: 0 0 16px 20px; }
  .lesson-body li{ margin-bottom:8px; }

  .quiz-block{
    margin-top: 34px; padding-top: 30px; border-top:1px solid rgba(27,42,74,0.08);
  }
  .quiz-q{ margin-bottom: 22px; }
  .quiz-q p{ font-weight:600; margin-bottom:12px; }
  .quiz-opts{ display:flex; flex-direction:column; gap:8px; }
  .opt{
    text-align:left; background: var(--panel); border:1px solid rgba(27,42,74,0.1);
    border-radius:8px; padding:12px 14px; color:var(--cream); font-size:0.9rem;
  }
  .opt:hover{ border-color: var(--gold-soft); }
  .opt.chosen{ border-color: var(--gold); background: rgba(184,135,43,0.1); }
  .opt.correct{ border-color:#6FA98B; background: rgba(111,169,139,0.12); }
  .opt.wrong{ border-color: var(--danger); background: rgba(201,99,75,0.12); }

  .reader-nav{ display:flex; justify-content:space-between; margin-top:36px; gap:12px; }

  /* ---------- Certificate ---------- */
  .cert{
    max-width:760px; margin:60px auto; padding:0 28px;
  }
  .cert-card{
    background: var(--panel); border:1px solid rgba(184,135,43,0.4); border-radius: var(--radius);
    padding: 50px 40px; text-align:center; position:relative;
  }
  .cert-card::before, .cert-card::after{
    content:''; position:absolute; width:34px; height:34px; border:2px solid var(--gold);
  }
  .cert-card::before{ top:14px; left:14px; border-right:none; border-bottom:none; }
  .cert-card::after{ bottom:14px; right:14px; border-left:none; border-top:none; }
  .cert-logo{ width:64px; height:64px; border-radius:50%; object-fit:cover; background:#FFFFFF; border:1px solid rgba(184,135,43,0.5); margin-bottom:18px; }
  .cert-eyebrow{ font-family:'JetBrains Mono'; font-size:0.72rem; letter-spacing:0.18em; color:var(--gold-soft); text-transform:uppercase; margin-bottom:20px; }
  .cert-name{ font-size:1.8rem; margin-bottom:10px; }
  .cert-course{ color: var(--olive); margin-bottom:28px; }
  .cert-score{ font-family:'JetBrains Mono'; color: var(--gold-soft); font-size:0.95rem; }
  .cert-meta{ margin-top:22px; font-size:0.82rem; color: var(--olive); }
  .cert-sign{ margin-top:36px; display:flex; flex-direction:column; align-items:center; }
  .cert-sign-img{ max-height:90px; max-width:260px; object-fit:contain; margin-bottom:8px; filter: brightness(1.3) contrast(1.05); }
  .cert-sign-placeholder{
    font-family:'Sora'; font-style:italic; font-weight:600; font-size:1.3rem;
    color: var(--cream); margin-bottom:6px;
  }
  .cert-sign-line{ width:200px; height:1px; background: rgba(27,42,74,0.3); margin-bottom:8px; }
  .cert-sign-title{ font-size:0.75rem; color: var(--olive); letter-spacing:0.02em; }

  /* ---------- Certificate photo template ---------- */
  .cert-photo-wrap{
    position:relative;
    width:100%;
    max-width:720px;
    margin:0 auto;
    aspect-ratio: 1402 / 1122;
    border-radius:10px;
    overflow:hidden;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.6);
    container-type: inline-size;
  }
  .cert-bg{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }
  .cert-mask{
    position:absolute;
    background:#f8f6f2;
  }
  .cert-ov-name{
    position:absolute;
    left:32%; width:36%; top:52.6%; height:6.4%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Alex Brush', cursive;
    color:#1b2a4a;
    font-size: 6.2cqw;
    line-height:1;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
  }
  .cert-ov-course{
    position:absolute;
    left:9%; width:82%; top:65.6%; height:3.6%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display', serif;
    font-weight:700;
    color:#1b2a4a;
    font-size: 1.85cqw;
    line-height:1.15;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
  }
  .cert-ov-date{
    position:absolute;
    left:34.2%; width:37%; top:76%; height:4.2%;
    display:flex; align-items:center; justify-content:flex-start;
    font-family:'Playfair Display', serif;
    color:#1b2a4a;
    font-size: 1.5cqw;
    line-height:1;
    text-align:left;
    white-space:nowrap;
    overflow:hidden;
  }
  @media (max-width:560px){
    .cert-ov-name{ font-size: 7cqw; }
    .cert-ov-course{ font-size: 2.1cqw; }
    .cert-ov-date{ font-size: 1.7cqw; }
  }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; bottom:24px; left:50%; transform: translateX(-50%) translateY(120%);
    background: var(--gold); color:#1B2A4A; font-weight:600; font-size:0.88rem;
    padding: 14px 22px; border-radius: 10px; transition: transform .35s cubic-bezier(.2,.8,.2,1); z-index:100;
  }
  .toast.show{ transform: translateX(-50%) translateY(0); }

  .hidden{ display:none !important; }

  footer{
    text-align:center; padding: 26px; color: var(--olive); font-size:0.75rem;
    border-top:1px solid rgba(27,42,74,0.06);
  }

  @media (max-width: 560px){
    .hero{ padding: 44px 20px 30px; }
    .section{ padding: 16px 20px 50px; }
    .cta-row{ flex-direction:column; align-items:flex-start; }
    .roots-signature{ width: 200px; height: 200px; top: -10px; right: -60px; opacity:0.6; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
    .roots-signature path{ stroke-dashoffset: 0 !important; }
    .roots-signature circle{ opacity: 1 !important; }
  }
</style>
</head>
<body>
<div class="app">

  COURSES[cid].modules.forEach(m => state.progress[cid][m.id] = { done:false, answered:false, correct:false, chosenIndex:null });
});

function getCourse(){ return COURSES[state.activeCourseId]; }
function getProgress(){ return state.progress[state.activeCourseId]; }

const root = document.getElementById('mainRoot');
const statusPill = document.getElementById('statusPill');

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2600);
}

function completedCount(){
  return Object.values(getProgress()).filter(p=>p.done).length;
}

function scorePercent(){
  const progress = getProgress();
  const total = Object.keys(progress).length;
  const correct = Object.values(progress).filter(p=>p.correct).length;
  return total === 0 ? 0 : Math.round((correct / total) * 100);
}

const PASS_THRESHOLD = 80;

function render(){
  const isPaid = state.activeCourseId ? state.paid[state.activeCourseId] : false;
  statusPill.textContent = isPaid ? 'Inscrit ✓' : 'Non inscrit';
  if(state.view === 'catalog') renderCatalog();
  else if(state.view === 'landing') renderLanding();
  else if(state.view === 'payment') renderPayment();
  else if(state.view === 'dashboard') renderDashboard();
  else if(state.view === 'lesson') renderLesson();
  else if(state.view === 'certificate') renderCertificate();
  root.classList.remove('view-enter');
  void root.offsetWidth; // force reflow to restart animation
  root.classList.add('view-enter');
}

  const COURSE = getCourse();

  const pct = scorePercent();
  const passed = pct >= PASS_THRESHOLD;
  root.innerHTML = `
    <section class="section" style="padding-top:50px;">
      <div class="section-head">
        <h2>${COURSE.title}</h2>

          const p = progress[m.id];
          let badge = '<span class="badge open">À faire</span>';
          if(p.done && p.correct) badge = '<span class="badge done">Réussi</span>';
          else if(p.done && !p.correct) badge = '<span class="badge locked">À revoir</span>';
          return `
            <div class="module-row" data-open="${m.id}">
              <div class="m-index">0${m.id}</div>

        }).join('')}

      ${allDone && passed ? `
        <div style="margin-top:24px;">
          <button class="btn-primary" id="goToCert">Voir mon certificat</button>

      ${allDone && !passed ? `
        <div class="paywall-card" style="margin-top:24px;">

        </div>
      ` : ''}

  `;

  document.querySelectorAll('[data-open]').forEach(row=>{
    row.addEventListener('click', ()=>{
      state.currentModule = parseInt(row.dataset.open);
      state.view = 'lesson';
      render();
    });
  });

  const certBtn = document.getElementById('goToCert');
  if(certBtn) certBtn.addEventListener('click', ()=>{ state.view = 'certificate'; render(); });
}

/* ---------- Lesson + quiz ---------- */
function renderLesson(){
  const COURSE = getCourse();
  const progress = getProgress();
  const m = COURSE.modules.find(x=>x.id === state.currentModule);
  const p = progress[m.id];
  const idx = COURSE.modules.indexOf(m);
  const total = COURSE.modules.length;

  root.innerHTML = `
    <section class="reader-shell">
      <div class="reader-head">
        <div class="breadcrumb" id="backToDash">← Tous les modules</div>
        <h2>0${m.id} — ${m.title}</h2>
        <div class="progress-track"><div class="progress-fill" style="width:${((idx)/total)*100}%"></div></div>
      </div>

      <div class="lesson-body">${m.body}</div>

      <div class="quiz-block">
        <div class="quiz-q">
          <p>Question de vérification</p>
          <p style="font-weight:400;">${m.quiz.q}</p>
          <div class="quiz-opts" id="quizOpts">
            ${m.quiz.options.map((opt,i)=>`<button class="opt" data-i="${i}">${opt}</button>`).join('')}
          </div>
          ${p.answered ? `<button class="btn-ghost" id="retryQuiz" style="margin-top:14px;">↻ Recommencer le quiz</button>` : ''}
        </div>
      </div>

      <div class="reader-nav">
        <button class="btn-ghost" id="prevBtn" ${idx===0 ? 'disabled style="opacity:.4;cursor:not-allowed;"' : ''}>← Module précédent</button>
        <button class="btn-primary" id="nextBtn">${idx === total-1 ? 'Terminer' : 'Module suivant →'}</button>
      </div>
    </section>
  `;

  document.getElementById('backToDash').addEventListener('click', ()=>{ state.view='dashboard'; render(); });

  function markAnsweredState(){
    if(!p.answered) return;
    document.querySelectorAll('#quizOpts .opt').forEach((b,i)=>{
      if(i === m.quiz.correct) b.classList.add('correct');
      else if(i === p.chosenIndex) b.classList.add('wrong');
    });
  }
  markAnsweredState();

  function bindQuizOptions(){
    document.querySelectorAll('#quizOpts .opt').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(p.answered) return;
        const chosen = parseInt(btn.dataset.i);
        const correct = m.quiz.correct;
        document.querySelectorAll('#quizOpts .opt').forEach((b,i)=>{
          if(i === correct) b.classList.add('correct');
          else if(i === chosen) b.classList.add('wrong');
        });
        p.answered = true;
        p.correct = (chosen === correct);
        p.chosenIndex = chosen;
        p.done = true;
        showToast(p.correct ? 'Bonne réponse !' : 'Pas tout à fait — la bonne réponse est en vert.');
        let retryBtn = document.getElementById('retryQuiz');
        if(!retryBtn){
          const quizQ = document.querySelector('.quiz-q');
          retryBtn = document.createElement('button');
          retryBtn.className = 'btn-ghost';
          retryBtn.id = 'retryQuiz';
          retryBtn.style.marginTop = '14px';
          retryBtn.textContent = '↻ Recommencer le quiz';
          quizQ.appendChild(retryBtn);
          retryBtn.addEventListener('click', resetQuiz);
        }
      });
    });
  }

  function resetQuiz(){
    p.answered = false;
    p.correct = false;
    p.chosenIndex = null;
    // p.done stays true once a module has been attempted, so dashboard progress doesn't regress
    document.querySelectorAll('#quizOpts .opt').forEach(b=>{
      b.classList.remove('correct','wrong');
    });
    const retryBtn = document.getElementById('retryQuiz');
    if(retryBtn) retryBtn.remove();
  }

  bindQuizOptions();
  const existingRetry = document.getElementById('retryQuiz');
  if(existingRetry) existingRetry.addEventListener('click', resetQuiz);

  document.getElementById('prevBtn').addEventListener('click', ()=>{
    if(idx > 0){ state.currentModule = COURSE.modules[idx-1].id; render(); }
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(idx < total-1){ state.currentModule = COURSE.modules[idx+1].id; render(); }
    else {
      const allDone = completedCount() === total;
      state.view = (allDone && scorePercent() >= PASS_THRESHOLD) ? 'certificate' : 'dashboard';
      render();
    }
  });
}

function formatCertDate(){
  const d = new Date();
  const mois = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  return `${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
}

function renderCertificate(){
  const COURSE = getCourse();

  if(!state.studentName){
    root.innerHTML = `
      <div class="cert">
        <div class="paywall-card">
          <p style="font-weight:600; margin-bottom:14px;">Pour générer ton certificat, indique ton nom complet :</p>
          <div class="field">
            <label>Nom et prénom</label>
            <input type="text" placeholder="Ex : Aïssatou Diallo" id="studentNameInput">
          </div>
          <button class="btn-primary btn-block" id="generateCertBtn">Générer mon certificat</button>
        </div>
      </div>
    `;
    document.getElementById('generateCertBtn').addEventListener('click', ()=>{
      const val = document.getElementById('studentNameInput').value.trim();
      if(!val){ showToast('Merci de renseigner ton nom complet.'); return; }
      state.studentName = val;
      render();
    });
    return;
  }

  root.innerHTML = `
    <div class="cert">
      <div class="cert-photo-wrap">
        <img src="${CERT_TEMPLATE_IMG}" alt="Certificat Racine Académie" class="cert-bg">
        <div class="cert-mask" style="left:32%; width:36%; top:52.6%; height:6.4%;"></div>
        <div class="cert-mask" style="left:9%; width:82%; top:65.6%; height:3.6%;"></div>
        <div class="cert-mask" style="left:34.2%; width:37%; top:76%; height:4.2%;"></div>
        <div class="cert-ov-name">${state.studentName}</div>
        <div class="cert-ov-course">${COURSE.title}</div>
        <div class="cert-ov-date">Fait à ${CERT_CITY}, le ${formatCertDate()}</div>
      </div>
      <div style="text-align:center; margin-top:24px; display:flex; flex-direction:column; gap:12px; align-items:center;">
        <button class="btn-primary" id="downloadCertBtn" style="width:100%; max-width:320px;">⬇ Télécharger mon certificat</button>
        <button class="btn-ghost" id="backDashFromCert">← Retour aux modules</button>
      </div>
    </div>
  `;
  document.getElementById('backDashFromCert').addEventListener('click', ()=>{ state.view='dashboard'; render(); });
  document.getElementById('downloadCertBtn').addEventListener('click', (e)=>{
    downloadCertificate(COURSE, e.target);
  });

  // Auto-shrink text to fit its box (handles long names / long course titles)
  function autoFit(el, minSizeCqw){
    if(!el) return;
    const cs = getComputedStyle(el);
    let sizeCqw = parseFloat(cs.fontSize) / (el.closest('.cert-photo-wrap').clientWidth) * 100;
    let guard = 0;
    while(el.scrollWidth > el.clientWidth + 1 && sizeCqw > minSizeCqw && guard < 30){
      sizeCqw -= 0.15;
      el.style.fontSize = sizeCqw + 'cqw';
      guard++;
    }
  }
  autoFit(document.querySelector('.cert-ov-name'), 2.2);
  autoFit(document.querySelector('.cert-ov-course'), 1.0);
  autoFit(document.querySelector('.cert-ov-date'), 0.9);
}

/* ---------- Certificate download (canvas rendering) ---------- */
async function downloadCertificate(COURSE, btnEl){
  const originalText = btnEl.textContent;
  btnEl.textContent = 'Préparation…';
  btnEl.disabled = true;
  try{
    // Make sure the custom fonts are loaded before drawing to canvas
    await Promise.all([
      document.fonts.load("40px 'Alex Brush'"),
      document.fonts.load("bold 24px 'Playfair Display'"),
      document.fonts.load("20px 'Playfair Display'"),
    ]);
    await document.fonts.ready;

    const img = new Image();
    img.crossOrigin = 'anonymous';
    await new Promise((resolve, reject)=>{
      img.onload = resolve;
      img.onerror = reject;
      img.src = CERT_TEMPLATE_IMG;
    });

    const W = img.naturalWidth, H = img.naturalHeight;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, W, H);

    const cream = '#f8f6f2';
    function maskRect(leftPct, topPct, wPct, hPct){
      ctx.fillStyle = cream;
      ctx.fillRect(W*leftPct, H*topPct, W*wPct, H*hPct);
    }
    maskRect(0.32, 0.526, 0.36, 0.064);
    maskRect(0.09, 0.656, 0.82, 0.036);
    maskRect(0.342, 0.76, 0.37, 0.042);

    ctx.fillStyle = '#1b2a4a';

    // Name (script font, centered in its box)
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let nameSize = W*0.062;
    ctx.font = `${nameSize}px 'Alex Brush', cursive`;
    const nameMaxWidth = W*0.36*0.94;
    while(ctx.measureText(state.studentName).width > nameMaxWidth && nameSize > 10){
      nameSize -= 1;
      ctx.font = `${nameSize}px 'Alex Brush', cursive`;
    }
    ctx.fillText(state.studentName, W*0.5, H*(0.526+0.032));

    // Course title (bold serif, centered)
    let courseSize = W*0.0185;
    ctx.font = `bold ${courseSize}px 'Playfair Display', serif`;
    const courseMaxWidth = W*0.82*0.96;
    while(ctx.measureText(COURSE.title).width > courseMaxWidth && courseSize > 8){
      courseSize -= 1;
      ctx.font = `bold ${courseSize}px 'Playfair Display', serif`;
    }
    ctx.fillText(COURSE.title, W*0.5, H*(0.656+0.018));

    // Date line (serif, left-aligned)
    ctx.textAlign = 'left';
    const dateSize = W*0.015;
    ctx.font = `${dateSize}px 'Playfair Display', serif`;
    ctx.fillText(`Fait à ${CERT_CITY}, le ${formatCertDate()}`, W*0.342, H*(0.76+0.021));

    const dataUrl = canvas.toDataURL('image/png', 0.95);
    const safeName = state.studentName.replace(/[^a-zA-Z0-9À-ÿ]+/g,'_');
    const safeCourse = COURSE.title.replace(/[^a-zA-Z0-9À-ÿ]+/g,'_');
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `Certificat_RacineAcademie_${safeCourse}_${safeName}.png`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    showToast('Certificat téléchargé !');
  } catch(err){
    console.error(err);
    showToast("Le téléchargement a échoué, réessaie.");
  } finally {
    btnEl.textContent = originalText;
    btnEl.disabled = false;
  }
}

render();
</script>
