<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Racine Académie</title>
<style>
  body{
    font-family: -apple-system, sans-serif;
    background:#F6F2E9;
    color:#1B2A4A;
    max-width:420px;
    margin:0 auto;
    padding:24px 20px 60px;
  }
  h1{ font-size:20px; margin-bottom:6px; }
  p.sub{ color:#64707A; font-size:14px; margin-bottom:24px; }
  label{ display:block; font-weight:600; font-size:14px; margin-bottom:6px; }
  input, select{
    width:100%;
    padding:12px;
    border:1px solid rgba(27,42,74,0.2);
    border-radius:10px;
    margin-bottom:16px;
    font-size:15px;
    box-sizing:border-box;
    background:white;
  }
  button{
    width:100%;
    padding:14px;
    background:#B8872B;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
  }
  button:disabled{ opacity:0.6; }
  #result{
    margin-top:20px;
    padding:16px;
    border-radius:10px;
    font-size:15px;
    display:none;
  }
  #result.success{ background:#e8f5e9; color:#1b5e20; display:block; }
  #result.error{ background:#fdecea; color:#a6392b; display:block; }
  .code-box{
    font-family: monospace;
    font-size:20px;
    font-weight:700;
    background:white;
    padding:12px;
    border-radius:8px;
    margin-top:8px;
    text-align:center;
    letter-spacing:1px;
  }
</style>
</head>
<body>
  <h1>Générer un code d'accès</h1>
  <p class="sub">Réservé à l'administrateur — utilise ton mot de passe secret (ADMIN_KEY).</p>

  <label>Cours</label>
  <select id="courseSelect">
    <option value="">Chargement des cours...</option>
  </select>

  <label>Mot de passe admin</label>
  <input type="password" id="adminKeyInput" placeholder="Ton mot de passe secret">

  <button id="generateBtn">Générer le code</button>

  <div id="result"></div>

  <script>
    const select = document.getElementById('courseSelect');
    const adminKeyInput = document.getElementById('adminKeyInput');
    const generateBtn = document.getElementById('generateBtn');
    const result = document.getElementById('result');

    fetch('/api/courses')
      .then(r => r.json())
      .then(data => {
        select.innerHTML = '';
        data.courses.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.title;
          select.appendChild(opt);
        });
      })
      .catch(() => {
        select.innerHTML = '<option value="">Erreur de chargement</option>';
      });

    generateBtn.addEventListener('click', async () => {
      const courseId = select.value;
      const adminKey = adminKeyInput.value.trim();
      result.className = '';
      result.style.display = 'none';

      if (!courseId || !adminKey) {
        result.className = 'error';
        result.textContent = 'Choisis un cours et entre ton mot de passe.';
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = 'Génération...';

      try {
        const res = await fetch('/api/admin/issue-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ courseId, adminKey })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          result.className = 'success';
          result.innerHTML = `Code généré avec succès :<div class="code-box">${data.code}</div>`;
        } else {
          result.className = 'error';
          result.textContent = data.error || 'Erreur lors de la génération.';
        }
      } catch (err) {
        result.className = 'error';
        result.textContent = 'Erreur de connexion. Réessaie.';
      }

      generateBtn.disabled = false;
      generateBtn.textContent = 'Générer le code';
    });
  </script>
</body>
</html>
